<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byash ❤️ Mona</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
    }
    .card {
        background: rgba(0,0,0,0.4);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    h1 {
        font-size: 40px;
    }
    p {
        font-size: 20px;
        margin-top: 15px;
    }
    .heart {
        font-size: 50px;
        animation: heartbeat 1s infinite;
    }
    @keyframes heartbeat {
        0% { transform: scale(1); }
        25% { transform: scale(1.2); }
        50% { transform: scale(1); }
        75% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

<div class="card">
    <div class="heart">❤️</div>
    <h1>Byash ❤️ Mona</h1>
    <p>My love for you grows stronger every day.</p>
    <p>You are my happiness, my world, my everything.</p>
    <p>Forever yours ❤️</p>
</div>

</body>
</html>
