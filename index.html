<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byash ❤️ Mona</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Floating Hearts */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Card */
.card {
  background: rgba(0,0,0,0.4);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 45px;
}

p {
  font-size: 20px;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.yes {
  background: #00c853;
  color: white;
}

.no {
  background: #ff1744;
  color: white;
  position: absolute;
}

/* Success Message */
#success {
  display: none;
  font-size: 30px;
  margin-top: 20px;
  color: #fff;
}
</style>
</head>

<body>

<!-- Floating hearts -->
<script>
for(let i=0;i<25;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);
}
</script>

<div class="card">
  <h1>Byash ❤️ Mona</h1>
  <p>My love for you grows stronger every day 💖</p>
  <p>Will you always be mine? 💍</p>

  <button class="btn yes" onclick="acceptLove()">YES 💖</button>
  <button class="btn no" id="noBtn" onmouseover="moveNo()">NO 😜</button>

  <div id="success">Yayyy! ❤️ I Love You Mona 😍💍</div>
</div>

<script>
function acceptLove() {
  document.getElementById("success").style.display = "block";
}

/* NO button runs away 😂 */
function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * 80 + "%";
  btn.style.left = Math.random() * 80 + "%";
}
</script>

</body>
</html>
