<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byash ❤️ Mona ❤️ Byom</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* Card */
.card{
  background:rgba(0,0,0,0.5);
  padding:25px;
  border-radius:20px;
  text-align:center;
  max-width:420px;
}

/* Slideshow */
.slide{
  width:100%;
  height:200px;
  border-radius:15px;
  object-fit:cover;
}

/* Baby */
.baby{
  font-size:28px;
  animation:bounce 1s infinite alternate;
}
@keyframes bounce{
  from{transform:translateY(0);}
  to{transform:translateY(-10px);}
}

/* Buttons */
.btn{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.yes{background:#00c853;color:white;}
.no{background:#ff1744;color:white;position:absolute;}

/* Fireworks */
.fire{
  position:fixed;
  font-size:25px;
  animation:boom 1s forwards;
}
@keyframes boom{
  from{transform:scale(0);}
  to{transform:scale(2);opacity:0;}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/CanonInD.wav">
</audio>

<div class="card">

<h2>Byash ❤️ Mona ❤️ Byom</h2>

<!-- Romantic slideshow (NO upload needed) -->
<img id="slide" class="slide" src="https://picsum.photos/400/300?random=1">

<div class="baby">👶💖</div>

<p>Our love made a beautiful world 💖</p>
<p>And our little star Byom made it complete ✨</p>

<p>
Dear Mona & Byom 💌<br>
You are my heart, my soul, my everything ❤️
</p>

<p>Will you always be my forever family? 💍</p>

<button class="btn yes" onclick="yesClick()">YES 💖</button>
<button class="btn no" id="noBtn" onmouseover="moveNo()">NO 😜</button>

<p id="result"></p>

</div>

<script>

/* Auto change romantic images */
setInterval(()=>{
  let count = 1;
setInterval(()=>{
  count++;
  document.getElementById("slide").src =
  "https://picsum.photos/400/300?random=" + count;
},2000);

/* YES click */
function yesClick(){
 document.getElementById("music").play();
 document.getElementById("result").innerHTML=
 "Forever ❤️ Byash, Mona & Byom 👨‍👩‍👦";

 for(let i=0;i<15;i++){
  let f=document.createElement("div");
  f.className="fire";
  f.innerHTML="🎆";
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
 }
}

/* NO button run */
function moveNo(){
 let b=document.getElementById("noBtn");
 b.style.top=Math.random()*80+"%";
 b.style.left=Math.random()*80+"%";
}
</script>

</body>
</html>
