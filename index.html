<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byash ❤️ Mona</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Card */
.card {
  background: rgba(0,0,0,0.4);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 45px;
}

p {
  font-size: 18px;
  margin: 8px 0;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.yes {
  background: #00c853;
  color: white;
}

.no {
  background: #ff1744;
  color: white;
}

/* Message */
#success {
  display: none;
  font-size: 28px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Byash ❤️ Mona</h1>

  <!-- Shayari -->
  <p>तुमसे ही शुरू मेरी हर सुबह होती है 💖</p>
  <p>तुमसे ही मेरी हर रात पूरी होती है 🌙</p>
  <p>तुम हो तो ये दुनिया अपनी लगती है ❤️</p>
  <p>वरना सब कुछ अधूरा सा लगता है… 💫</p>

  <p style="margin-top:15px;">Will you always be mine? 💍</p>

  <button class="btn yes" onclick="acceptLove()">YES 💖</button>
  <button class="btn no" onclick="noClick()">NO 😜</button>

  <div id="success">Hehehe 😍 I knew it! Love You Mona 💖💍</div>
</div>

<script>
function acceptLove() {
  document.getElementById("success").style.display = "block";
}

/* NO button trap 😆 */
function noClick() {
  alert("NO option disabled 😜 Only YES allowed ❤️");
  acceptLove();
}
</script>

</body>
</html>
