<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byash ❤️ Mona</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Floating hearts */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Card */
.card {
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
  max-width: 400px;
}

/* Image */
.photo {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

h1 {
  font-size: 32px;
}

p {
  font-size: 16px;
  margin: 5px 0;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.yes {
  background: #00c853;
  color: white;
}

.no {
  background: #ff1744;
  color: white;
  position: absolute;
}

/* Success */
#success {
  display: none;
  font-size: 24px;
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- Floating hearts -->
<script>
for(let i=0;i<25;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);
}
</script>

<div class="card">

  <!-- 👇 IMPORTANT: Upload your image in repo and keep same name -->
  <img src="photo.jpg" class="photo">

  <h1>Byash ❤️ Mona</h1>

  <!-- Romantic Shayari -->
  <p>Every moment with you feels like a beautiful dream ✨</p>
  <p>Your smile is my peace, your love is my life 💖</p>
  <p>Byash ❤️ Mona — a story written by destiny</p>
  <p>And I promise to love you endlessly 💫</p>

  <p style="margin-top:10px;">Will you always be mine? 💍</p>

  <button class="btn yes" onclick="acceptLove()">YES 💖</button>
  <button class="btn no" id="noBtn" onmouseover="moveNo()">NO 😜</button>

  <div id="success">I knew it 😍 Love you forever Mona 💖💍</div>

</div>

<script>
function acceptLove() {
  document.getElementById("success").style.display = "block";
}

/* NO button runs away 😂 */
function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * 80 + "%";
  btn.style.left = Math.random() * 80 + "%";
}
</script>

</body>
</html>
