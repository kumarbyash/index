<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byash ❤️ Mona ❤️ Byom</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* Floating hearts */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Card */
.card{
  background:rgba(0,0,0,0.5);
  padding:30px;
  border-radius:20px;
  text-align:center;
  max-width:420px;
}

/* Baby animation */
.baby{
  font-size:30px;
  animation:bounce 1s infinite alternate;
}
@keyframes bounce{
  from{transform:translateY(0);}
  to{transform:translateY(-10px);}
}

/* Buttons */
.btn{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.yes{background:#00c853;color:white;}
.no{background:#ff1744;color:white;position:absolute;}

/* Fireworks */
.fire{
  position:fixed;
  font-size:25px;
  animation:boom 1s forwards;
}
@keyframes boom{
  from{transform:scale(0);}
  to{transform:scale(2);opacity:0;}
}
</style>
</head>

<body>

<!-- Floating hearts -->
<script>
for(let i=0;i<25;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);
}
</script>

<!-- Music -->
<audio id="music" loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/CanonInD.wav">
</audio>

<div class="card">

<h2>Byash ❤️ Mona ❤️ Byom</h2>

<div class="baby">👶💖</div>

<p>Our love made a beautiful world 💖</p>
<p>And our little star Byom made it complete ✨</p>

<p>
Dear Mona & Byom 💌<br>
You are my heart, my soul, my everything ❤️
</p>

<p>Will you always be my forever family? 💍</p>

<button class="btn yes" onclick="yesClick()">YES 💖</button>
<button class="btn no" id="noBtn" onmouseover="moveNo()">NO 😜</button>

<p id="result"></p>

</div>

<script>

/* YES click */
function yesClick(){
 document.getElementById("music").play();
 document.getElementById("result").innerHTML =
 "Forever ❤️ Byash, Mona & Byom 👨‍👩‍👦";

 // Fireworks
 for(let i=0;i<15;i++){
  let f=document.createElement("div");
  f.className="fire";
  f.innerHTML="🎆";
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
 }
}

/* NO button run */
function moveNo(){
 let b=document.getElementById("noBtn");
 b.style.top=Math.random()*80+"%";
 b.style.left=Math.random()*80+"%";
}
</script>

</body>
</html>
